<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="OVERLOAD"/>
<meta name="theme-color" content="#080808"/>
<title>OVERLOAD</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080808; --bg2: #0d0d0d; --bg3: #141414;
    --border: #1c1c1c; --border2: #2a2a2a;
    --text: #f0ede8; --text2: #aaa; --text3: #555; --text4: #333;
    --red: #e8572a; --blue: #2a7de8; --green: #2ae87d; --yellow: #e8c32a;
    --col-a: #e8572a; --col-b: #2a7de8; --col-c: #2ae87d;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', 'Courier New', monospace; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: #222; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input:focus, select:focus { outline: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; transition: opacity .12s, transform .12s; }
  button:active { transform: scale(.95); opacity: .75; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 9px; overflow: hidden; }
  .chip { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 3px; font-size: 8px; letter-spacing: .1em; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }
  .fu { animation: fadeUp .2s ease forwards; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100dvh; padding-top: var(--safe-top); }
  #header { padding: 18px 18px 12px; border-bottom: 1px solid #141414; display: flex; justify-content: space-between; align-items: flex-end; flex-shrink: 0; }
  #nav { display: flex; border-bottom: 1px solid #141414; overflow-x: auto; flex-shrink: 0; }
  #nav button { background: none; border-bottom: 2px solid transparent; padding: 9px 11px; font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--text4); white-space: nowrap; }
  #nav button.active { color: var(--text); border-bottom-color: var(--red); }
  #content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(16px + var(--safe-bot)); max-width: 500px; width: 100%; margin: 0 auto; }

  /* Stepper */
  .stepper { display: flex; align-items: center; gap: 5px; }
  .stepper button { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); width: 30px; height: 30px; border-radius: 4px; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .stepper input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 5px 4px; font-family: inherit; font-size: 14px; width: 54px; text-align: center; border-radius: 4px; }
  .stepper span { font-size: 9px; color: var(--text4); min-width: 22px; }

  /* Modal overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .sheet { background: var(--bg2); border: 1px solid #222; border-radius: 13px 13px 0 0; width: 100%; max-width: 500px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; padding-bottom: var(--safe-bot); }
  .sheet-header { padding: 15px 17px 9px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .sheet-body { overflow-y: auto; padding: 8px 14px 16px; flex: 1; }

  /* Circle timer */
  .timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px 0 4px; }
  .timer-circle { position: relative; width: 106px; height: 106px; }
  .timer-circle svg { transform: rotate(-90deg); }
  .timer-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .timer-num { font-family: 'Bebas Neue'; font-size: 36px; line-height: 1; }
  .timer-label { font-size: 8px; color: var(--text3); letter-spacing: .12em; }

  /* Set dot */
  .set-dot { min-width: 32px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; border: 1px solid var(--border); background: #111; color: #2a2a2a; transition: all .2s; }
  .set-dot.done { background: #0d1f0d; border-color: rgba(42,232,125,.2); color: var(--green); }
  .set-dot.next { background: rgba(232,87,42,.13); }

  /* Mini ex row */
  .mini-ex { padding: 7px 11px; border-radius: 5px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; border: 1px solid #141414; cursor: pointer; }
  .mini-ex.done { opacity: .45; }
  .mini-ex.skipped { opacity: .25; cursor: default; }

  /* Progress bars */
  .bar-wrap { display: flex; align-items: flex-end; gap: 2px; }
  .bar { border-radius: 2px; transition: height .3s; flex: 1; }

  /* Form inputs */
  .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 10px; font-family: inherit; font-size: 12px; border-radius: 4px; }
  select.form-input option { background: var(--bg2); }

  /* Buttons */
  .btn-primary { width: 100%; padding: 12px; border-radius: 6px; font-size: 9px; letter-spacing: .16em; color: #fff; }
  .btn-ghost { background: var(--bg3); border: 1px solid var(--border); color: var(--text4); padding: 6px 13px; border-radius: 4px; font-size: 9px; letter-spacing: .12em; }

  /* Breadcrumb pills */
  #breadcrumbs { display: flex; gap: 3px; margin-bottom: 11px; overflow-x: auto; padding-bottom: 2px; }
  .bcrumb { min-width: 28px; height: 26px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 8px; border: 1px solid #1a1a1a; background: #111; color: #2a2a2a; cursor: pointer; transition: all .2s; }

  /* Week tab */
  .wk-tab { padding: 4px 9px; border-radius: 3px; font-size: 8px; letter-spacing: .1em; white-space: nowrap; border: 1px solid var(--border); background: #111; color: var(--text4); }
  .wk-tab.active { background: var(--red); border-color: var(--red); color: #fff; }

  /* Adherence tile */
  .adh-tile { flex: 1; padding: 9px 4px; border-radius: 5px; text-align: center; background: #0a0a0a; border: 1px solid #181818; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div style="font-size:8px;letter-spacing:.24em;color:#3a3a3a;text-transform:uppercase;margin-bottom:2px">RESIDENCY TRAINING</div>
      <div style="font-family:'Bebas Neue';font-size:36px;letter-spacing:.04em;line-height:1">OVERLOAD</div>
    </div>
    <div id="dur-display" style="text-align:right;display:none">
      <div style="font-size:8px;color:#3a3a3a;letter-spacing:.1em">ELAPSED</div>
      <div id="dur-val" style="font-family:'Bebas Neue';font-size:20px;color:var(--red)">0m 00s</div>
    </div>
  </div>
  <div id="nav">
    <button onclick="showView('dashboard')" data-view="dashboard" class="active">Week</button>
    <button onclick="showView('session')" data-view="session">Session</button>
    <button onclick="showView('history')" data-view="history">History</button>
    <button onclick="showView('progress')" data-view="progress">Progress</button>
  </div>
  <div id="content"></div>
</div>

<!-- Templates -->
<template id="tpl-stepper">
  <div class="stepper">
    <button class="step-minus">−</button>
    <input type="number" class="step-val"/>
    <span class="step-unit"></span>
    <button class="step-plus">+</button>
  </div>
</template>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const REGIMEN = {
  A: { label:'A — Upper Compounds', color:'#e8572a', exercises:[
    {id:'pullups',   name:'Pull-ups',            sets:4, reps:'max', unit:'reps'},
    {id:'bench',     name:'Bench Press',         sets:3, reps:8,    unit:'lb'},
    {id:'row',       name:'Bent Over Row',       sets:3, reps:8,    unit:'lb'},
    {id:'ohp',       name:'Shoulder Press',      sets:3, reps:8,    unit:'lb'},
  ]},
  B: { label:'B — Lower + Core', color:'#2a7de8', exercises:[
    {id:'atg',       name:'ATG Split Squat',     sets:2, reps:8,    unit:'BW'},
    {id:'splitsquat',name:'DB Split Squat',      sets:4, reps:6,    unit:'lb'},
    {id:'rdl',       name:'RDL',                 sets:3, reps:8,    unit:'lb'},
    {id:'calf',      name:'Calf Raises + Holds', sets:3, reps:12,   unit:'lb'},
    {id:'deadbug',   name:'Dead Bug',            sets:3, reps:12,   unit:'reps'},
  ]},
  C: { label:'C — Arms', color:'#2ae87d', exercises:[
    {id:'curl',      name:'Bicep Curls',         sets:3, reps:8,    unit:'lb'},
    {id:'concurl',   name:'Conc./Hammer Curls',  sets:2, reps:8,    unit:'lb'},
    {id:'revcurl',   name:'Reverse Curls',       sets:2, reps:12,   unit:'lb'},
    {id:'lateral',   name:'Lateral Raises',      sets:3, reps:12,   unit:'lb'},
    {id:'skull',     name:'Skull Crushers',      sets:3, reps:8,    unit:'lb'},
    {id:'dips',      name:'Dips',                sets:3, reps:'max',unit:'reps'},
  ]},
};
const DEFAULTS = {pullups:3,bench:55,row:25,ohp:40,atg:0,splitsquat:20,rdl:50,calf:50,deadbug:0,curl:35,concurl:25,revcurl:10,lateral:10,skull:25,dips:0};
const REST_SECS = 90;

// ═══════════════════════════════════════════════════════════════
// IndexedDB
// ═══════════════════════════════════════════════════════════════
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('overload', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('kv')) d.createObjectStore('kv');
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function dbGet(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbSet(key, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    const req = tx.objectStore('kv').put(val, key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
let state = {
  weeks: {},        // {weekKey: {A:{completed,weights,volumePerEx,totalVol,duration,date}, runs:N}}
  activeWeek: getWeekKey(0),
  view: 'dashboard',
  session: null,    // {day, startTs, exercises:[{...ex,targetSets,targetReps,weight,sets:[],skipped,custom}]}
  curExIdx: 0,
  resting: false,
  restSecs: REST_SECS,
  pending: null,    // {reps, weight} logged during rest
  summary: null,
  jumping: false,
  showCustom: false,
  newLift: {name:'',sets:3,reps:8,unit:'lb'},
  wkDur: 0,
};

let restTimer = null, durTimer = null;

// ═══════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════
function getWeekKey(offset=0) {
  const now = new Date(), mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay()+6)%7) + offset*7);
  return mon.toISOString().slice(0,10);
}
function getWeekLabel(wk) {
  const d = new Date(wk), e = new Date(wk);
  e.setDate(d.getDate()+6);
  return `${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${e.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
}
function fmtDur(s) { return `${Math.floor(s/60)}m ${(s%60).toString().padStart(2,'0')}s`; }
function calcVol(sets, unit) {
  return unit==='lb' ? sets.reduce((a,s)=>a+(s.reps||0)*(s.weight||0),0)
                     : sets.reduce((a,s)=>a+(s.reps||0),0);
}
function genId() { return Math.random().toString(36).slice(2,9); }
function tryVibrate() { try { navigator?.vibrate?.([200,100,200]); } catch{} }
function getPrevWeight(day, exId) {
  for (const wk of Object.keys(state.weeks).sort().reverse()) {
    if (wk===state.activeWeek) continue;
    const w = state.weeks[wk]?.[day]?.weights?.[exId];
    if (w!==undefined) return w;
  }
  return DEFAULTS[exId]??0;
}
async function saveWeeks() { await dbSet('weeks', state.weeks); }

// ═══════════════════════════════════════════════════════════════
// Timers
// ═══════════════════════════════════════════════════════════════
function startRestTimer() {
  clearInterval(restTimer);
  restTimer = setInterval(()=>{
    if (!state.resting) { clearInterval(restTimer); return; }
    state.restSecs--;
    if (state.restSecs<=0) { state.resting=false; clearInterval(restTimer); tryVibrate(); }
    renderTimerOnly();
  }, 1000);
}
function stopRestTimer() { clearInterval(restTimer); }
function startDurTimer() {
  clearInterval(durTimer);
  durTimer = setInterval(()=>{
    if (!state.session) { clearInterval(durTimer); return; }
    state.wkDur = Math.floor((Date.now()-state.session.startTs)/1000);
    const el = document.getElementById('dur-val');
    if (el) el.textContent = fmtDur(state.wkDur);
  }, 1000);
}

// ═══════════════════════════════════════════════════════════════
// Session logic
// ═══════════════════════════════════════════════════════════════
function startSession(day) {
  const exercises = REGIMEN[day].exercises.map(ex=>({
    ...ex, targetSets:ex.sets, targetReps:ex.reps,
    weight: getPrevWeight(day, ex.id),
    sets: [], skipped: false, custom: false,
  }));
  state.session = { day, startTs: Date.now(), exercises };
  state.curExIdx = 0;
  state.resting = false; state.restSecs = REST_SECS;
  state.pending = null; state.summary = null;
  state.jumping = false; state.showCustom = false;
  state.wkDur = 0;
  startDurTimer();
  showView('session');
}

function handleCompleteSet() {
  const ex = state.session.exercises[state.curExIdx];
  const last = ex.sets[ex.sets.length-1];
  state.pending = {
    reps: last?.reps ?? (typeof ex.targetReps==='number'?ex.targetReps:0),
    weight: last?.weight ?? ex.weight,
  };
  state.resting = true;
  state.restSecs = REST_SECS;
  startRestTimer();
  render();
}

function commitSet() {
  if (!state.pending||!state.session) return;
  const idx = state.curExIdx;
  const ex = state.session.exercises[idx];
  ex.weight = state.pending.weight;
  ex.sets.push({reps: state.pending.reps, weight: state.pending.weight});
  state.pending = null;
  if (ex.sets.length >= ex.targetSets) {
    const next = idx+1;
    if (next < state.session.exercises.length) state.curExIdx = next;
  }
  render();
}

function skipRest() { state.resting=false; stopRestTimer(); render(); }

function jumpTo(idx) { state.curExIdx=idx; state.jumping=false; state.resting=false; state.pending=null; stopRestTimer(); render(); }
function markSkipped(idx) { state.session.exercises[idx].skipped=true; render(); }
function unmarkSkipped(idx) { state.session.exercises[idx].skipped=false; render(); }

function finishSession() {
  if (!state.session) return;
  const {day} = state.session;
  const duration = Math.floor((Date.now()-state.session.startTs)/1000);
  const weights = {};
  const volumePerEx = state.session.exercises.map(ex=>{
    if (!ex.skipped&&ex.sets.length>0) weights[ex.id]=ex.weight;
    return {id:ex.id,name:ex.name,unit:ex.unit,skipped:ex.skipped,sets:ex.sets,volume:calcVol(ex.sets,ex.unit),custom:!!ex.custom};
  });
  const totalVol = volumePerEx.reduce((a,e)=>a+e.volume,0);
  const wkData = state.weeks[state.activeWeek]||{};
  state.weeks[state.activeWeek] = { ...wkData, [day]:{completed:true,weights,volumePerEx,totalVol,duration,date:new Date().toISOString()} };
  saveWeeks();
  state.summary = {day,duration,totalVol,volumePerEx};
  clearInterval(durTimer);
  state.session = null;
  document.getElementById('dur-display').style.display='none';
  render();
}

function toggleRun() {
  const wk = state.weeks[state.activeWeek]||{};
  const cur = wk.runs||0;
  state.weeks[state.activeWeek] = {...wk, runs:(cur+1)%3};
  saveWeeks();
  render();
}

function addCustomToSession() {
  const nl = state.newLift;
  if (!nl.name.trim()) return;
  state.session.exercises.push({
    id:genId(), name:nl.name.trim(),
    targetSets:Number(nl.sets), targetReps:Number(nl.reps),
    sets:Number(nl.sets), reps:Number(nl.reps),
    unit:nl.unit, weight:0, sets:[], skipped:false, custom:true,
  });
  state.showCustom=false;
  state.newLift={name:'',sets:3,reps:8,unit:'lb'};
  render();
}

// ═══════════════════════════════════════════════════════════════
// Rendering helpers
// ═══════════════════════════════════════════════════════════════
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for (const c of children) {
    if (c==null) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}
function div(attrs,...c) { return el('div',attrs,...c); }
function span(attrs,...c) { return el('span',attrs,...c); }
function btn(attrs,...c) { return el('button',attrs,...c); }

function makestepper(value, onChange, step=5, min=0, unit='') {
  const inp = el('input',{type:'number',class:'step-val',value});
  inp.addEventListener('change',()=>onChange(Number(inp.value)));
  const minus = btn({},'−'); minus.className='';
  const plus  = btn({},'+'): plus.className='';
  minus.style.cssText='background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:30px;height:30px;border-radius:4px;font-size:16px;display:flex;align-items:center;justify-content:center;';
  plus.style.cssText=minus.style.cssText;
  inp.style.cssText='background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 4px;font-family:inherit;font-size:14px;width:54px;text-align:center;border-radius:4px;';
  minus.onclick=()=>onChange(Math.max(min,Number(inp.value)-step));
  plus.onclick=()=>onChange(Number(inp.value)+step);
  const unitSpan = span({style:'font-size:9px;color:var(--text4);min-width:22px'},unit);
  const wrap = div({style:'display:flex;align-items:center;gap:5px;'});
  wrap.append(minus,inp,unitSpan,plus);
  return { wrap, getValue:()=>Number(inp.value), setValue:v=>{inp.value=v;} };
}

function circleTimer(seconds, total) {
  const r=42, circ=2*Math.PI*r;
  const col = seconds>45?'#2ae87d':seconds>20?'#e8c32a':'#e8572a';
  const pct = seconds/total;
  const svg = `<svg width="106" height="106" style="transform:rotate(-90deg)">
    <circle cx="53" cy="53" r="${r}" fill="none" stroke="#1c1c1c" stroke-width="5"/>
    <circle id="rest-arc" cx="53" cy="53" r="${r}" fill="none" stroke="${col}" stroke-width="5"
      stroke-dasharray="${circ*pct} ${circ}" stroke-linecap="round"
      style="transition:stroke-dasharray 0.8s linear,stroke 0.4s"/>
  </svg>`;
  const wrap = div({class:'timer-wrap'});
  const circ_wrap = div({class:'timer-circle',html:svg});
  const inner = div({class:'timer-inner'});
  const numEl = div({class:'timer-num',id:'rest-num',style:`color:${col}`},String(seconds));
  inner.append(numEl, span({class:'timer-label'},'REST'));
  circ_wrap.appendChild(inner);
  const skipBtn = btn({style:'background:none;border:1px solid var(--border2);color:var(--text3);padding:4px 14px;border-radius:3px;font-size:9px;letter-spacing:.12em;',onclick:skipRest},'SKIP');
  wrap.append(circ_wrap, skipBtn);
  return wrap;
}

function renderTimerOnly() {
  const numEl = document.getElementById('rest-num');
  const arcEl = document.getElementById('rest-arc');
  if (!numEl||!arcEl) return;
  const s=state.restSecs, total=REST_SECS;
  const r=42, circ=2*Math.PI*r;
  const col = s>45?'#2ae87d':s>20?'#e8c32a':'#e8572a';
  numEl.textContent=String(s);
  numEl.style.color=col;
  arcEl.setAttribute('stroke',col);
  arcEl.setAttribute('stroke-dasharray',`${circ*(s/total)} ${circ}`);
  if (!state.resting) render();
}

// ═══════════════════════════════════════════════════════════════
// View: Dashboard
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const c = div({class:'fu'});
  const wd = state.weeks[state.activeWeek]||{};
  const runs = wd.runs||0;

  // Week tabs
  const tabs = div({style:'display:flex;gap:5px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;'});
  for (let off=-3; off<=0; off++) {
    const wk=getWeekKey(off);
    const t = btn({class:'wk-tab'+(state.activeWeek===wk?' active':''), onclick:()=>{state.activeWeek=wk;render();}},
      off===0?'THIS WEEK':getWeekLabel(wk));
    tabs.appendChild(t);
  }
  c.appendChild(tabs);

  // Adherence card
  const adh = div({class:'card',style:'padding:13px;margin-bottom:13px;'});
  adh.appendChild(div({style:'font-size:8px;letter-spacing:.18em;color:#3a3a3a;margin-bottom:9px;'},'WEEKLY ADHERENCE'));
  const tiles = div({style:'display:flex;gap:6px;margin-bottom:8px;'});
  for (const d of ['A','B','C']) {
    const done=wd[d]?.completed, col=REGIMEN[d].color;
    const t = div({class:'adh-tile',style:`background:${done?col+'18':'#0a0a0a'};border:1px solid ${done?col+'44':'#181818'};`});
    t.appendChild(div({style:`font-family:'Bebas Neue';font-size:22px;color:${done?col:'#222'};`},d));
    t.appendChild(div({style:`font-size:7px;color:${done?'#555':'#1c1c1c'};letter-spacing:.1em;`},done?'DONE':'–'));
    tiles.appendChild(t);
  }
  // Run tile
  const rt = div({class:'adh-tile',style:`background:${runs>0?'#ffffff08':'#0a0a0a'};border:1px solid ${runs>0?'#ffffff1a':'#181818'};cursor:pointer;`,onclick:toggleRun});
  rt.appendChild(div({style:`font-family:'Bebas Neue';font-size:22px;color:${runs>0?'var(--text)':'#222'};`},`${runs}/2`));
  rt.appendChild(div({style:'font-size:7px;color:#3a3a3a;letter-spacing:.08em;'},'RUNS'));
  tiles.appendChild(rt);
  adh.appendChild(tiles);
  const done3=['A','B','C'].filter(d=>wd[d]?.completed).length;
  adh.appendChild(div({style:'font-size:8px;color:#2a2a2a;'},`${done3}/3 lifts · ${runs}/2 runs`));
  c.appendChild(adh);

  // C locked notice
  if (!wd.A?.completed||!wd.B?.completed) {
    c.appendChild(div({style:'background:#0a0a0a;border:1px solid #181818;border-radius:4px;padding:6px 11px;margin-bottom:11px;font-size:8px;color:#333;'},
      '🔒 ', el('span',{style:'color:var(--green);'},'Day C'), ' unlocks after A + B'));
  }

  // Day cards
  for (const day of ['A','B','C']) {
    const locked = day==='C'&&(!wd.A?.completed||!wd.B?.completed);
    const done = wd[day]?.completed, col=REGIMEN[day].color;
    const card = div({class:'card',style:`margin-bottom:9px;opacity:${locked?0.3:1};border-left:3px solid ${done?col:'#1c1c1c'};`});
    const inner = div({style:'padding:11px 13px;display:flex;justify-content:space-between;align-items:center;'});
    const info = div({});
    info.appendChild(div({style:`font-family:'Bebas Neue';font-size:17px;color:${done?col:'#bbb'};`},REGIMEN[day].label));
    let sub = `${REGIMEN[day].exercises.length} exercises`;
    if (done&&wd[day]?.duration) sub+=` · ${fmtDur(wd[day].duration)}`;
    if (done&&wd[day]?.totalVol) sub+=` · ${wd[day].totalVol.toLocaleString()} vol`;
    info.appendChild(div({style:'font-size:8px;color:#333;margin-top:1px;'},sub));
    inner.appendChild(info);
    if (!locked) {
      const b = btn({style:`padding:6px 13px;border-radius:4px;font-size:9px;letter-spacing:.12em;background:${done?'#161616':col};color:${done?'#3a3a3a':'#fff'};`,
        onclick:()=>startSession(day)}, done?'REDO':'START');
      inner.appendChild(b);
    }
    card.appendChild(inner);
    c.appendChild(card);
  }
  return c;
}

// ═══════════════════════════════════════════════════════════════
// View: Session
// ═══════════════════════════════════════════════════════════════
function renderSession() {
  const c = div({class:'fu'});

  // Summary state
  if (state.summary&&!state.session) {
    const s = state.summary;
    c.appendChild(div({style:'font-family:\'Bebas Neue\';font-size:26px;color:var(--green);margin-bottom:2px;'},'SESSION COMPLETE'));
    c.appendChild(div({style:'font-size:8px;color:#444;margin-bottom:16px;letter-spacing:.08em;'},
      `Day ${s.day} · ${fmtDur(s.duration)} · ${s.totalVol.toLocaleString()} total volume`));
    for (const ex of s.volumePerEx) {
      const card = div({class:'card',style:'margin-bottom:7px;padding:10px 13px;'});
      const row = div({style:'display:flex;justify-content:space-between;align-items:baseline;margin-bottom:'+(ex.skipped?0:5)+'px;'});
      row.appendChild(span({style:`font-size:11px;color:${ex.skipped?'#333':'#c8c4be'};`},ex.name));
      if (ex.skipped) row.appendChild(span({class:'chip',style:'background:#1a0808;color:#553333;border:1px solid #2a1010;'},'SKIPPED'));
      else row.appendChild(span({style:'font-family:\'Bebas Neue\';font-size:15px;color:var(--text);'},`${ex.volume.toLocaleString()} ${ex.unit==='lb'?'lb·reps':'reps'}`));
      card.appendChild(row);
      if (!ex.skipped&&ex.sets.length>0) {
        const chips = div({style:'display:flex;gap:4px;flex-wrap:wrap;'});
        ex.sets.forEach((s,j)=>{
          chips.appendChild(span({class:'chip',style:'background:#141414;color:#555;border:1px solid #1e1e1e;'},
            `S${j+1}: ${s.reps}r${ex.unit==='lb'?` @ ${s.weight}lb`:''}`));
        });
        card.appendChild(chips);
      }
      c.appendChild(card);
    }
    c.appendChild(btn({style:'width:100%;margin-top:8px;padding:12px;border-radius:6px;font-size:10px;letter-spacing:.16em;background:var(--red);color:#fff;',
      onclick:()=>{state.summary=null;render();}}, 'DONE'));
    return c;
  }

  // No session
  if (!state.session&&!state.summary) {
    const wd=state.weeks[state.activeWeek]||{};
    c.appendChild(div({style:'font-size:9px;color:#333;margin-bottom:13px;letter-spacing:.1em;'},'SELECT DAY'));
    for (const day of ['A','B','C']) {
      const locked=day==='C'&&(!wd.A?.completed||!wd.B?.completed);
      const b = btn({disabled:locked,style:`width:100%;padding:13px 15px;border-radius:7px;margin-bottom:9px;text-align:left;background:var(--bg2);border:1px solid ${locked?'#141414':'#1c1c1c'};opacity:${locked?0.3:1};`,
        onclick:()=>startSession(day)});
      b.appendChild(span({style:`font-family:'Bebas Neue';font-size:20px;color:${locked?'#222':REGIMEN[day].color};`},day));
      b.appendChild(span({style:'font-size:11px;margin-left:9px;color:#555;'},REGIMEN[day].label.split('—')[1].trim()));
      c.appendChild(b);
    }
    return c;
  }

  if (!state.session) return c;
  const sess = state.session;
  const col = REGIMEN[sess.day].color;
  const curEx = sess.exercises[state.curExIdx];

  // Jump modal
  if (state.jumping) {
    const ov = div({class:'overlay',onclick:e=>{if(e.target===ov){state.jumping=false;render();}}});
    const sheet = div({class:'sheet'});
    const sh = div({class:'sheet-header'});
    sh.appendChild(span({style:'font-size:9px;color:#777;letter-spacing:.14em;'},'JUMP TO EXERCISE'));
    sh.appendChild(btn({style:'font-size:16px;color:#444;',onclick:()=>{state.jumping=false;render();}}, '✕'));
    sheet.appendChild(sh);
    const body = div({class:'sheet-body'});
    sess.exercises.forEach((ex,i)=>{
      const done=ex.sets.length>=ex.targetSets, active=i===state.curExIdx;
      const row = div({style:`padding:9px 11px;border-radius:5px;margin-bottom:5px;cursor:${ex.skipped?'default':'pointer'};background:${active?'#1a1a1a':'#0f0f0f'};border:1px solid ${active?'#2a2a2a':'#161616'};opacity:${ex.skipped?0.35:1};`,
        onclick:()=>{ if(!ex.skipped) jumpTo(i); }});
      const r2=div({style:'display:flex;justify-content:space-between;align-items:center;'});
      r2.appendChild(span({style:`font-size:11px;color:${done?'#444':'#aaa'};`},`${i+1}. ${ex.name}`));
      r2.appendChild(span({style:`font-size:8px;color:${done?'#2ae87d':ex.skipped?'#554':active?col:'#333'};`},
        ex.skipped?'SKIPPED':done?'✓ DONE':active?'● ACTIVE':`${ex.sets.length}/${ex.targetSets}`));
      row.appendChild(r2); body.appendChild(row);
    });
    sheet.appendChild(body); ov.appendChild(sheet);
    c.appendChild(ov);
  }

  // Custom lift modal
  if (state.showCustom) {
    const ov = div({class:'overlay',onclick:e=>{if(e.target===ov){state.showCustom=false;render();}}});
    const sheet = div({class:'sheet',style:'padding:18px 16px 32px;'});
    sheet.appendChild(div({style:'font-family:\'Bebas Neue\';font-size:18px;color:var(--red);margin-bottom:12px;'},'ADD ONE-OFF LIFT'));
    // Name
    const nameInp=el('input',{type:'text',placeholder:'e.g. Face Pulls',class:'form-input',value:state.newLift.name});
    nameInp.oninput=()=>{state.newLift.name=nameInp.value;};
    sheet.appendChild(div({style:'font-size:8px;color:#444;margin-bottom:3px;letter-spacing:.1em;'},'NAME'));
    sheet.appendChild(nameInp);
    const row3=div({style:'display:flex;gap:8px;margin:9px 0 12px;'});
    for (const [label,key,tp] of [['SETS','sets','number'],['REPS','reps','number']]) {
      const w=div({style:'flex:1;'});
      w.appendChild(div({style:'font-size:8px;color:#444;margin-bottom:3px;letter-spacing:.1em;'},label));
      const inp=el('input',{type:tp,class:'form-input',style:'text-align:center;',value:state.newLift[key]});
      inp.oninput=()=>{state.newLift[key]=inp.value;};
      w.appendChild(inp); row3.appendChild(w);
    }
    const uw=div({style:'flex:1;'});
    uw.appendChild(div({style:'font-size:8px;color:#444;margin-bottom:3px;letter-spacing:.1em;'},'UNIT'));
    const usel=el('select',{class:'form-input'});
    for (const u of ['lb','reps','BW']) { const o=el('option',{value:u},u); if(u===state.newLift.unit)o.selected=true; usel.appendChild(o); }
    usel.onchange=()=>{state.newLift.unit=usel.value;};
    uw.appendChild(usel); row3.appendChild(uw);
    sheet.appendChild(row3);
    sheet.appendChild(btn({style:'width:100%;padding:11px;border-radius:5px;font-size:9px;letter-spacing:.15em;background:var(--red);color:#fff;',
      onclick:addCustomToSession},'ADD TO SESSION'));
    ov.appendChild(sheet); c.appendChild(ov);
  }

  // Breadcrumb pills
  const bc=div({id:'breadcrumbs'});
  sess.exercises.forEach((ex,i)=>{
    const done=ex.sets.length>=ex.targetSets, active=i===state.curExIdx;
    const p=div({class:'bcrumb',style:`background:${active?col+'2a':done?'#0d200d':'#111'};border:1px solid ${active?col:done?'#1a3a1a':'#1a1a1a'};color:${active?col:done?'#2ae87d':ex.skipped?'#222':'#2a2a2a'};`,
      onclick:()=>{if(!ex.skipped)jumpTo(i);}},String(i+1));
    bc.appendChild(p);
  });
  const addBtn=div({class:'bcrumb',style:'border:1px dashed #252525;font-size:14px;color:#2a2a2a;cursor:pointer;',
    onclick:()=>{state.showCustom=true;render();}},'+'  );
  bc.appendChild(addBtn);
  c.appendChild(bc);

  // Current exercise card
  if (curEx) {
    const card=div({class:'card',style:`margin-bottom:10px;border-left:3px solid ${col};`});
    const top=div({style:'padding:13px 15px 10px;'});
    const topRow=div({style:'display:flex;justify-content:space-between;align-items:flex-start;'});
    const info=div({style:'flex:1;'});
    info.appendChild(div({style:'font-size:8px;color:#3a3a3a;letter-spacing:.12em;margin-bottom:2px;'},`EXERCISE ${state.curExIdx+1} / ${sess.exercises.length}`));
    info.appendChild(div({style:'font-family:\'Bebas Neue\';font-size:22px;color:var(--text);line-height:1.1;'},curEx.name));
    const sub2=div({style:'font-size:8px;color:#3a3a3a;margin-top:3px;'});
    sub2.appendChild(document.createTextNode(`${curEx.targetSets} sets × ${curEx.targetReps} reps`));
    if (curEx.unit==='lb') sub2.appendChild(span({style:'color:#252525;'},` · last: ${getPrevWeight(sess.day,curEx.id)}lb`));
    info.appendChild(sub2);
    topRow.appendChild(info);
    topRow.appendChild(btn({style:'background:#141414;border:1px solid #1e1e1e;color:#3a3a3a;padding:5px 9px;border-radius:3px;font-size:8px;letter-spacing:.08em;margin-left:8px;',
      onclick:()=>{state.jumping=true;render();}},'JUMP'));
    top.appendChild(topRow);

    // Set dots
    const dots=div({style:'display:flex;gap:4px;margin-top:10px;flex-wrap:wrap;'});
    for (let i=0;i<curEx.targetSets;i++) {
      const done=i<curEx.sets.length, next=i===curEx.sets.length;
      const d=div({class:`set-dot${done?' done':next?' next':''}`,style:next?`border-color:${col};color:${col};`:''});
      d.textContent=done?`${curEx.sets[i].reps}r`:String(i+1);
      dots.appendChild(d);
    }
    top.appendChild(dots);

    // Ghost prev
    if (curEx.unit==='lb') top.appendChild(div({style:'margin-top:7px;font-size:8px;color:#1e1e1e;letter-spacing:.08em;'},
      `PREV SESSION → ${getPrevWeight(sess.day,curEx.id)}lb`));

    card.appendChild(top);

    // Bottom action panel
    const bot=div({style:'border-top:1px solid #141414;padding:10px 14px;'});

    if (state.resting) {
      // Timer + log form
      bot.style.paddingTop='4px';
      bot.appendChild(circleTimer(state.restSecs,REST_SECS));
      if (state.pending) {
        bot.appendChild(div({style:'font-size:8px;color:#444;letter-spacing:.12em;margin-bottom:9px;text-align:center;'},`LOG SET ${curEx.sets.length+1}`));
        const form=div({style:'display:flex;flex-direction:column;gap:9px;'});

        // Reps stepper
        const repsRow=div({style:'display:flex;justify-content:space-between;align-items:center;'});
        repsRow.appendChild(span({style:'font-size:10px;color:#555;'},'Reps'));
        let repsVal=state.pending.reps;
        const repsMinus=btn({},'−'); const repsPlus=btn({},'+');
        const repsInp=el('input',{type:'number',value:repsVal});
        Object.assign(repsInp.style,{background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--text)',padding:'5px 4px',fontFamily:'inherit',fontSize:'14px',width:'54px',textAlign:'center',borderRadius:'4px'});
        for (const b of [repsMinus,repsPlus]) { Object.assign(b.style,{background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--text2)',width:'30px',height:'30px',borderRadius:'4px',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center'}); }
        repsMinus.onclick=()=>{repsVal=Math.max(0,repsVal-1);repsInp.value=repsVal;state.pending.reps=repsVal;};
        repsPlus.onclick=()=>{repsVal++;repsInp.value=repsVal;state.pending.reps=repsVal;};
        repsInp.onchange=()=>{repsVal=Number(repsInp.value);state.pending.reps=repsVal;};
        const repsWrap=div({style:'display:flex;align-items:center;gap:5px;'});
        repsWrap.appendChild(repsMinus); repsWrap.appendChild(repsInp);
        repsWrap.appendChild(span({style:'font-size:9px;color:var(--text4);min-width:22px;'},'reps'));
        repsWrap.appendChild(repsPlus);
        repsRow.appendChild(repsWrap); form.appendChild(repsRow);

        // Weight stepper (lb only)
        if (curEx.unit==='lb') {
          const wRow=div({style:'display:flex;justify-content:space-between;align-items:center;'});
          wRow.appendChild(span({style:'font-size:10px;color:#555;'},'Weight'));
          let wVal=state.pending.weight;
          const wMinus=btn({},'−'),wPlus=btn({},'+');
          const wInp=el('input',{type:'number',value:wVal});
          Object.assign(wInp.style,{background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--text)',padding:'5px 4px',fontFamily:'inherit',fontSize:'14px',width:'54px',textAlign:'center',borderRadius:'4px'});
          for (const b of [wMinus,wPlus]) { Object.assign(b.style,{background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--text2)',width:'30px',height:'30px',borderRadius:'4px',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center'}); }
          wMinus.onclick=()=>{wVal=Math.max(0,wVal-5);wInp.value=wVal;state.pending.weight=wVal;};
          wPlus.onclick=()=>{wVal+=5;wInp.value=wVal;state.pending.weight=wVal;};
          wInp.onchange=()=>{wVal=Number(wInp.value);state.pending.weight=wVal;};
          const wWrap=div({style:'display:flex;align-items:center;gap:5px;'});
          wWrap.appendChild(wMinus); wWrap.appendChild(wInp);
          wWrap.appendChild(span({style:'font-size:9px;color:var(--text4);min-width:22px;'},'lb'));
          wWrap.appendChild(wPlus);
          wRow.appendChild(wWrap); form.appendChild(wRow);
        }

        form.appendChild(btn({style:`width:100%;padding:10px;border-radius:5px;font-size:9px;letter-spacing:.14em;background:${col};color:#fff;margin-top:2px;`,onclick:commitSet},'CONFIRM SET'));
        bot.appendChild(form);
      }
    } else {
      bot.style.display='flex'; bot.style.gap='7px';
      if (curEx.skipped) {
        bot.appendChild(btn({style:'flex:1;padding:10px;border-radius:5px;font-size:9px;letter-spacing:.12em;background:#1a0a0a;border:1px solid #2a1010;color:#774;',
          onclick:()=>unmarkSkipped(state.curExIdx)},'UNDO SKIP'));
      } else if (curEx.sets.length<curEx.targetSets) {
        bot.appendChild(btn({style:`flex:1;padding:10px;border-radius:5px;font-size:9px;letter-spacing:.12em;background:${col};color:#fff;`,
          onclick:handleCompleteSet},`COMPLETE SET ${curEx.sets.length+1}`));
        bot.appendChild(btn({style:'padding:10px 11px;border-radius:5px;font-size:9px;letter-spacing:.1em;background:#141414;border:1px solid #1e1e1e;color:#3a3a3a;',
          onclick:()=>markSkipped(state.curExIdx)},'SKIP'));
      } else {
        const nextIdx=state.curExIdx+1;
        if (nextIdx<sess.exercises.length) {
          bot.appendChild(btn({style:'flex:1;padding:10px;border-radius:5px;font-size:9px;letter-spacing:.12em;background:#0d1f0d;border:1px solid rgba(42,232,125,.2);color:var(--green);',
            onclick:()=>{state.curExIdx=nextIdx;render();}},'NEXT EXERCISE →'));
        } else {
          bot.appendChild(btn({style:'flex:1;padding:10px;border-radius:5px;font-size:9px;letter-spacing:.12em;background:#0d1f0d;border:1px solid rgba(42,232,125,.2);color:var(--green);',
            onclick:finishSession},'FINISH SESSION ✓'));
        }
      }
    }
    card.appendChild(bot);
    c.appendChild(card);
  }

  // Mini exercise list
  const miniList=div({style:'margin-bottom:11px;'});
  sess.exercises.forEach((ex,i)=>{
    if (i===state.curExIdx) return;
    const done=ex.sets.length>=ex.targetSets;
    const row=div({class:`mini-ex${done?' done':''}${ex.skipped?' skipped':''}`,
      onclick:()=>{if(!ex.skipped)jumpTo(i);}});
    row.appendChild(span({style:`font-size:10px;color:${done?'#3a3a3a':'#777'};`},ex.name));
    row.appendChild(span({style:`font-size:8px;color:${done?'#2ae87d':ex.skipped?'#554':'#2a2a2a'};`},
      ex.skipped?'SKIPPED':done?'✓':ex.sets.length>0?`${ex.sets.length}/${ex.targetSets}`:'–'));
    miniList.appendChild(row);
  });
  c.appendChild(miniList);

  c.appendChild(btn({style:'width:100%;padding:12px;border-radius:6px;font-size:9px;letter-spacing:.16em;background:#111;border:1px solid #222;color:#444;',
    onclick:finishSession},'FINISH & SAVE SESSION'));

  return c;
}

// ═══════════════════════════════════════════════════════════════
// View: History
// ═══════════════════════════════════════════════════════════════
function renderHistory() {
  const c=div({class:'fu'});
  c.appendChild(div({style:'font-size:8px;color:#333;letter-spacing:.16em;margin-bottom:14px;'},'RECENT WEEKS'));
  const keys=Object.keys(state.weeks).sort().reverse().slice(0,12);
  if (!keys.length) { c.appendChild(div({style:'color:#222;font-size:12px;'},'No sessions yet.')); return c; }
  for (const wk of keys) {
    const wd=state.weeks[wk]||{};
    const done=['A','B','C'].filter(d=>wd[d]?.completed);
    const r=wd.runs||0;
    const card=div({class:'card',style:'margin-bottom:9px;padding:11px 13px;'});
    const row=div({style:'display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;'});
    row.appendChild(span({style:'font-size:11px;color:#777;'},getWeekLabel(wk)));
    row.appendChild(span({style:`font-size:8px;color:${done.length>=2?'#2ae87d':'#333'};`},`${done.length}/3 · ${r}/2 🏃`));
    card.appendChild(row);
    const chips=div({style:'display:flex;gap:5px;flex-wrap:wrap;'});
    for (const d of ['A','B','C']) {
      const c2=span({class:'chip',style:`background:${wd[d]?.completed?REGIMEN[d].color+'18':'#0a0a0a'};color:${wd[d]?.completed?REGIMEN[d].color:'#222'};border:1px solid ${wd[d]?.completed?REGIMEN[d].color+'44':'#161616'};`},
        d+(wd[d]?.duration?' '+fmtDur(wd[d].duration):''));
      chips.appendChild(c2);
    }
    chips.appendChild(span({class:'chip',style:`background:${r>=2?'#ffffff08':'#0a0a0a'};color:${r>=2?'#888':'#222'};border:1px solid ${r>=2?'#ffffff1a':'#161616'};`},`${r}/2 🏃`));
    card.appendChild(chips);
    if (done.length) {
      const vols=div({style:'margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;'});
      for (const d of done) {
        if (wd[d]?.totalVol) vols.appendChild(span({style:'font-size:7px;color:#2a2a2a;'},`Day ${d}: ${wd[d].totalVol.toLocaleString()} vol`));
      }
      card.appendChild(vols);
    }
    c.appendChild(card);
  }
  return c;
}

// ═══════════════════════════════════════════════════════════════
// View: Progress
// ═══════════════════════════════════════════════════════════════
function renderProgress() {
  const c=div({class:'fu'});
  c.appendChild(div({style:'font-size:8px;color:#333;letter-spacing:.16em;margin-bottom:14px;'},'PROGRESSIVE OVERLOAD'));
  const tracked=['A','B','C'].flatMap(d=>REGIMEN[d].exercises.filter(e=>e.unit==='lb'));
  let any=false;
  for (const ex of tracked) {
    const data=Object.keys(state.weeks).sort().map(wk=>{
      for (const d of ['A','B','C']) {
        const w=state.weeks[wk]?.[d];
        if (w?.weights?.[ex.id]!==undefined) {
          const ve=w.volumePerEx?.find(e=>e.id===ex.id);
          return {week:getWeekLabel(wk),weight:w.weights[ex.id],vol:ve?.volume??null,key:wk};
        }
      }
      return null;
    }).filter(Boolean);
    if (!data.length) continue;
    any=true;
    const ws=data.map(d=>d.weight);
    const maxW=Math.max(...ws),minW=Math.min(...ws);
    const latest=data[data.length-1],prev=data[data.length-2];
    const dW=prev?latest.weight-prev.weight:null;
    const vols=data.map(d=>d.vol).filter(v=>v!=null);
    const maxV=vols.length?Math.max(...vols):0,minV=vols.length?Math.min(...vols):0;
    const latestVol=latest.vol,prevVol=data.length>1?data[data.length-2].vol:null;
    const dV=prevVol!=null&&latestVol!=null?latestVol-prevVol:null;

    const card=div({class:'card',style:'margin-bottom:9px;padding:12px 13px;'});
    const hrow=div({style:'display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;'});
    hrow.appendChild(span({style:'font-size:11px;color:#bbb;'},ex.name));
    const rhs=div({style:'display:flex;gap:7px;align-items:center;'});
    if (dW!=null) rhs.appendChild(span({style:`font-size:8px;color:${dW>0?'#2ae87d':dW<0?'#e8572a':'#444'};`},`${dW>0?'↑':dW<0?'↓':'→'}${Math.abs(dW)}lb`));
    rhs.appendChild(span({style:'font-family:\'Bebas Neue\';font-size:19px;color:var(--text);'},`${latest.weight}lb`));
    hrow.appendChild(rhs); card.appendChild(hrow);

    // Weight bars
    card.appendChild(div({style:'font-size:7px;color:#2a2a2a;letter-spacing:.1em;margin-bottom:3px;'},'WEIGHT'));
    const wbars=div({class:'bar-wrap',style:'height:26px;margin-bottom:7px;'});
    data.forEach((d,i)=>{
      const h=maxW===minW?13:((d.weight-minW)/(maxW-minW))*22+4;
      wbars.appendChild(div({class:'bar',style:`height:${h}px;background:${i===data.length-1?'#e8572a':'#1e1e1e'};`}));
    });
    card.appendChild(wbars);

    // Volume bars
    if (vols.length>0) {
      const vlrow=div({style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;'});
      vlrow.appendChild(span({style:'font-size:7px;color:#2a2a2a;letter-spacing:.1em;'},'VOLUME (lb·reps)'));
      const vrhs=div({style:'display:flex;gap:5px;align-items:center;'});
      if (dV!=null) vrhs.appendChild(span({style:`font-size:7px;color:${dV>0?'#2a7de8':dV<0?'#e8572a':'#333'};`},`${dV>0?'↑':dV<0?'↓':'→'}${Math.abs(dV).toLocaleString()}`));
      if (latestVol!=null) vrhs.appendChild(span({style:'font-size:8px;color:#444;'},latestVol.toLocaleString()));
      vlrow.appendChild(vrhs); card.appendChild(vlrow);
      const vbars=div({class:'bar-wrap',style:'height:18px;'});
      data.forEach((d,i)=>{
        const v=d.vol??0,h=maxV===minV?9:((v-minV)/(maxV-minV))*14+4;
        vbars.appendChild(div({class:'bar',style:`height:${h}px;background:${i===data.length-1?'#2a7de8':'#141420'};`}));
      });
      card.appendChild(vbars);
      const daterow=div({style:'display:flex;justify-content:space-between;margin-top:3px;'});
      daterow.appendChild(span({style:'font-size:6px;color:#1e1e1e;'},data[0]?.week));
      daterow.appendChild(span({style:'font-size:6px;color:#1e1e1e;'},latest.week));
      card.appendChild(daterow);
    }
    c.appendChild(card);
  }
  if (!any) c.appendChild(div({style:'color:#222;font-size:11px;'},'Log sessions to see your progression.'));
  return c;
}

// ═══════════════════════════════════════════════════════════════
// Router
// ═══════════════════════════════════════════════════════════════
function showView(v) {
  state.view=v;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  render();
}

function render() {
  const content=document.getElementById('content');
  content.innerHTML='';
  const durDisplay=document.getElementById('dur-display');
  durDisplay.style.display=state.session?'block':'none';

  let view;
  switch(state.view) {
    case 'dashboard': view=renderDashboard(); break;
    case 'session':   view=renderSession();   break;
    case 'history':   view=renderHistory();   break;
    case 'progress':  view=renderProgress();  break;
    default:          view=renderDashboard();
  }
  content.appendChild(view);
}

// ═══════════════════════════════════════════════════════════════
// Service Worker (offline)
// ═══════════════════════════════════════════════════════════════
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE='overload-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(res.ok&&e.request.method==='GET'){
      const clone=res.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone));
    }
    return res;
  }).catch(()=>caches.match('/'))));
});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
(async ()=>{
  await openDB();
  const saved=await dbGet('weeks');
  if (saved) state.weeks=saved;
  registerSW();
  render();
})();
</script>
